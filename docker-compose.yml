version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cityatlas
      POSTGRES_USER: cityatlas
      POSTGRES_PASSWORD: cityatlas_dev
    ports:
      - "5432:5432"
    volumes:
      - cityatlas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityatlas -d cityatlas"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/cityatlas
      DB_USERNAME: cityatlas
      DB_PASSWORD: cityatlas_dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api/backend
      BACKEND_API_URL: http://backend:8080/api
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  cityatlas_pg_data:
