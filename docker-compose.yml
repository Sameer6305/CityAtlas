version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cityatlas
      POSTGRES_USER: cityatlas
      POSTGRES_PASSWORD: cityatlas_dev
    ports:
      - "5432:5432"
    volumes:
      - cityatlas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityatlas -d cityatlas"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/cityatlas
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CITYATLAS_CORS_ALLOWED_ORIGINS: ${CITYATLAS_CORS_ALLOWED_ORIGINS:?CITYATLAS_CORS_ALLOWED_ORIGINS is required}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:?OPENWEATHER_API_KEY is required}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:?OPENAQ_API_KEY is required}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?SPOTIFY_CLIENT_ID is required}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?SPOTIFY_CLIENT_SECRET is required}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:?SPOTIFY_REDIRECT_URI is required}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:?UNSPLASH_ACCESS_KEY is required}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://backend:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      BACKEND_API_URL: http://backend:8080/api
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://frontend:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  cityatlas_pg_data:
