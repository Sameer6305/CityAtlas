name: CityAtlas CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cityatlas
          POSTGRES_USER: cityatlas
          POSTGRES_PASSWORD: cityatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cityatlas -d cityatlas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
        working-directory: ./backend
      - name: Build and test backend
        run: ./mvnw clean verify -q
        working-directory: ./backend
        env:
          SPRING_CONFIG_IMPORT: ""
          DB_URL: jdbc:postgresql://127.0.0.1:5432/cityatlas
          DB_USERNAME: cityatlas
          DB_PASSWORD: cityatlas
          CITYATLAS_CORS_ALLOWED_ORIGINS: http://frontend.test
          SPOTIFY_REDIRECT_URI: https://example.com/api/callback/spotify
          JWT_SECRET: test-secret-key-with-at-least-thirty-two-characters
          OPENWEATHER_API_KEY: test-openweather-key
          OPENAQ_API_KEY: test-openaq-key
          SPOTIFY_CLIENT_ID: test-spotify-client-id
          SPOTIFY_CLIENT_SECRET: test-spotify-client-secret
          UNSPLASH_ACCESS_KEY: test-unsplash-access-key

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Lint frontend
        run: npm run lint
